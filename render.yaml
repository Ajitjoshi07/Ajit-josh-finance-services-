services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: ajit-finance-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ASYNC_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: STORAGE_BACKEND
        value: "local"
      - key: LOCAL_STORAGE_PATH
        value: "./uploads"
    healthCheckPath: /health
    autoDeploy: true

  # ── React Frontend (Static Site) ──────────────────────────────────────────
  - type: web
    name: ajit-finance-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
