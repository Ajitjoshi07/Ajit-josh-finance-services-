services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: ajit-finance-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ajit-finance-db
          property: connectionString
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: ajit-finance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ajit-finance-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: https://ajit-finance-frontend.onrender.com
      - key: STORAGE_BACKEND
        value: local
    healthCheckPath: /health

  # ── Celery Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: ajit-finance-celery
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.core.celery_app worker --loglevel=info
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ajit-finance-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ajit-finance-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  # ── React Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: ajit-finance-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ajit-finance-backend.onrender.com

databases:
  - name: ajit-finance-db
    plan: free
    databaseName: ajit_finance_db
    user: ajit_admin

# Redis (via environment variable - use Render's Redis add-on)
# Add REDIS_URL manually from Render dashboard
